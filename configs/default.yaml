paths:
  canvas_world_model: ../canvas-world-model
  canvas_robot_control: ../canvas-robot-control
  robotic_foundation_model_tests: ../robotic-foundation-model-tests
  base_canvas: ../canvas-world-model/datasets/shoulder_pan_500
  val_dataset: ../canvas-world-model/datasets/shoulder_pan_500
  live_checkpoint: ../canvas-world-model/local/checkpoints/diffusion/best.pth
  ckpt_dir: ./checkpoints
  canvas_out: ./datasets/canvas
  lerobot_out: ./datasets/lerobot
  runs_dir: ./runs
  registry_file: ./checkpoints/registry.json
  python: C:/Projects/pythonenv-lerobot/Scripts/python.exe

robot:
  port: COM3
  robot_id: my_so101_follower
  control_joint: shoulder_pan
  step_size: 10.0
  joint_min: -60.0
  joint_max: 60.0
  base_camera: 1
  wrist_camera: 0
  camera_width: 640
  camera_height: 480
  camera_fps: 10

thresholds:
  tau_low: 0.005
  tau_high: 0.015
  val_guard: 1.25

cadence:
  idle_seconds: 60
  probes_per_verify: 6
  window_size: 24
  settle_time: 0.5
  explore_batch_size: 30
  ft_epochs: 3

actions:
  # Discrete action ids understood by the world model / policy.
  # 1 = move positive, 2 = move negative, 3 = hold.
  candidates: [1, 2, 3]
  probe_weights: null  # optional uniform; orchestrator overrides with error-weighted

explore:
  # Shell-out recording config that reuses run_single_action_record.py
  action_duration: 1.0
  dataset_fps: 10
  policy_joint_name: shoulder_pan.pos
  vary_target_joint: false
  # Cameras stringified for lerobot-record --robot.cameras argument
  base_camera_name: base_0_rgb
  wrist_camera_name: left_wrist_0_rgb

dry_run: false
